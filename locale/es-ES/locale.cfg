[mod-setting-description]
ribbon-maze-blocks=Establece el ancho del laberinto igual al tamaño del bloque (ignorado si la generación del mapa es finita).
ribbon-maze-chart-nearby-crude-oil=Revela inmediatamente un parche de petróleo crudo cerca del inicio (el petróleo crudo debe ser controlado por Ribbon Maze para que tenga efecto).
ribbon-maze-chart-nearby-uranium-ore=Revela inmediatamente un parche de uranio cerca del inicio (el uranio debe ser controlado por Ribbon Maze para que tenga efecto).
ribbon-maze-clear-start=Limpia un área cuadrada del laberinto de acuerdo al número inicial de bloques (32 baldosas por bloque). Hace más espacio para la base inicial y crea más puntos de entrada al laberinto.
ribbon-maze-coal=¿Deseas que Ribbon Maze controle la generación de parches de carbón agregando parches ricos en callejones sin salida?
ribbon-maze-copper-ore=¿Deseas que Ribbon Maze controle la generación de parches de cobre agregando parches ricos en callejones sin salida?
ribbon-maze-crude-oil=¿Deseas que Ribbon Maze controle la generación de parches de petróleo crudo agregando parches ricos en callejones sin salida?
ribbon-maze-iron-ore=¿Deseas que Ribbon Maze controle la generación de parches de hierro agregando parches ricos en callejones sin salida?
ribbon-maze-stone=¿Deseas que Ribbon Maze controle la generación de parches de piedra agregando parches ricos en callejones sin salida?
ribbon-maze-uranium-ore=¿Deseas que Ribbon Maze controle la generación de parches de uranio agregando parches ricos en callejones sin salida?
ribbon-maze-mod-resources=¿Deseas que Ribbon Maze controle la generación de parches de recursos no vanilla (recursos de otros mods) agregando parches ricos en callejones sin salida?
ribbon-maze-mixed-patchwork-min=Las menas se mezclan en los parches, el tamaño mínimo de cada pequeño parche se controla con esta configuración.
ribbon-maze-mixed-patchwork-max=Las menas se mezclan en los parches, el tamaño máximo de cada pequeño parche se controla con esta configuración.
ribbon-maze-mixed-preferred=Los recursos mezclados cerca del inicio, son mezclados a lo largo del laberinto.
ribbon-maze-separate-out-infinite-ores=Las menas infinitas (de mods, por ejemplo Angel's Infinite Ores) son puestos en sus propios parches en vez de en medio de parches normales.
ribbon-maze-infinite-ore-stretch-factor=Indica cuántos bloques de distancia aumenta el tamaño de los parches de menas infinitas (de mods, por ejemplo Angel's Infinite Ores). Valores altos indican que tienes que viajar más profundo para encontrar parches de menas infinitas más grandes.
ribbon-maze-resource-stretch-factor=Indica cuántos bloques de distancia aumenta el tamaño de los parches de menas. Valores altos indican que tienes que viajar más profundo para encontrar parches de menas más grandes.
ribbon-maze-block-size=El tamaño de los caminos y "muros" del laberinto en baldosas.
ribbon-maze-loop-chance=(Ej: 0.15) Da una probabilidad de generar bucles en el laberinto (haciendo el laberinto imperfecto). Ten en cuenta que más bucles indican menos callejones sin salida, reduciendo el número de parches de recursos. Cuidado: Para valores mayores a 0.4 se recomienda desactivar el control de Ribbon Maze en los recursos.
ribbon-maze-water-resource=Hace que el agua sea elegible para ser puesta en los callejones sin salida. Esto competirá con los recursos, pero hará más fácil el acceso al agua sin necesidad de terraformar.
ribbon-maze-clearing-chance=Probabilidad de generar espacios abiertos en el laberinto.
ribbon-maze-clearing-size-max=Tamaño máximo permitido de espacios abiertos aleatorios en el laberinto.
ribbon-maze-mangrove-density=Probabilidad de generar manglares.
ribbon-maze-green-raw-ratio=El ratio de madera verde a madera en bruto producida por los manglares. La madera verde puede ser convertida en madera normal una vez desbloquees "Secado en horno de madera".

